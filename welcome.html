<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>叶修 | 荣耀之神的空间</title>
    <link rel="stylesheet" type="text/css" href="css/vno.css">
    <link rel="stylesheet" type="text/css" href="css/iconfont.css">
    <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
    <link rel="icon" href="./favicon.ico">
    
    <style>
        /* ========== 覆盖原有样式，融合深色主题 ========== */
        body {
            background: linear-gradient(135deg, #0f0c1f 0%, #1a1c2e 50%, #2d2a4a 100%) !important;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            position: relative;
        }
        
        /* 添加动态光晕背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(169, 91, 195, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(192, 132, 252, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* 面板背景覆盖层 - 改为深色半透明 */
        .panel-cover--overlay {
            background-color: rgba(15, 12, 31, 0.7) !important;
        }
        
        /* 面板主要内容区域背景 */
        .panel-main__inner {
            background: rgba(20, 18, 32, 0.55) !important;
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        /* ========== 渐变文字效果 ========== */
        .panel-cover__title a {
            background: linear-gradient(135deg, #f5e7a3, #c084fc, #a95bc3) !important;
            background-clip: text !important;
            -webkit-background-clip: text !important;
            color: transparent !important;
            font-weight: bold;
            font-size: 2.5rem;
        }
        
        .panel-cover__title a:hover {
            background: linear-gradient(135deg, #ffe6a3, #d9a5fc, #c07be3) !important;
            background-clip: text !important;
            -webkit-background-clip: text !important;
        }
        
        .panel-cover__subtitle {
            background: linear-gradient(135deg, #e0d4ff, #c9a5f0) !important;
            background-clip: text !important;
            -webkit-background-clip: text !important;
            color: transparent !important;
            font-weight: 500;
        }
        
        .panel-cover__description {
            color: #d4c5ff !important;
        }
        
        .remark .power,
        .remark .power a {
            color: #9a8fc2 !important;
        }
        
        .remark .power a:hover {
            color: #c084fc !important;
        }
        
        /* 分割线颜色 */
        .panel-cover__divider {
            background: linear-gradient(90deg, transparent, rgba(169, 91, 195, 0.8), transparent) !important;
            height: 2px;
        }
        
        /* 导航按钮样式 */
        .blog-button {
            transition: all 0.3s ease;
        }
        
        .blog-button:hover {
            transform: translateY(-2px);
        }
        
        .navigation__item a {
            color: #e0d4ff !important;
            transition: 0.2s;
            background: rgba(169, 91, 195, 0.15);
            padding: 8px 20px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }
        
        .navigation__item a:hover {
            color: #c084fc !important;
            transform: translateY(-2px);
            background: rgba(169, 91, 195, 0.3);
        }
        
        /* 社交图标颜色 */
        .social {
            color: #c9a5f0 !important;
            transition: 0.2s;
        }
        
        .social:hover {
            color: #a95bc3 !important;
            transform: scale(1.15);
        }
        
        /* 头像悬停效果增强 */
        .ih-item.circle .img {
            border: 2px solid rgba(169, 91, 195, 0.5);
            box-shadow: 0 0 15px rgba(169, 91, 195, 0.3);
        }
        
        /* ========== 掉落枫叶容器 ========== */
        .falling-leaves {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }
        
        .leaf {
            position: absolute;
            top: -20px;
            font-size: 24px;
            animation: fall linear forwards;
            pointer-events: none;
            color: rgba(255, 160, 60, 0.8);
            text-shadow: 0 0 2px rgba(0,0,0,0.3);
        }
        
        /* ========== 奖杯掉落容器 ========== */
        .falling-trophies {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
            overflow: hidden;
        }
        
        .trophy {
            position: absolute;
            top: -30px;
            font-size: 28px;
            animation: trophyFall linear forwards;
            pointer-events: none;
            filter: drop-shadow(0 0 3px gold);
        }
        
        /* ========== 鼠标点击特效容器 ========== */
        .click-effect {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            font-size: 28px;
            animation: clickPop 0.6s ease-out forwards;
        }
        
        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0.3;
            }
        }
        
        @keyframes trophyFall {
            0% {
                transform: translateY(-30px) rotate(0deg) scale(1);
                opacity: 1;
            }
            50% {
                transform: translateY(50vh) rotate(180deg) scale(1.1);
                opacity: 0.9;
            }
            100% {
                transform: translateY(100vh) rotate(360deg) scale(0.8);
                opacity: 0.2;
            }
        }
        
        @keyframes clickPop {
            0% {
                transform: translate(-50%, -50%) scale(0.5) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2) rotate(20deg);
                opacity: 0.9;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.5) rotate(40deg);
                opacity: 0;
            }
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .leaf {
                font-size: 18px;
            }
            .trophy {
                font-size: 22px;
            }
            .click-effect {
                font-size: 22px;
            }
            .panel-cover__title a {
                font-size: 1.8rem;
            }
            .panel-main__inner {
                margin: 15px;
            }
        }
    </style>
</head>

<body>
    <!-- 掉落枫叶容器 -->
    <div class="falling-leaves" id="fallingLeaves"></div>
    <!-- 掉落奖杯容器 -->
    <div class="falling-trophies" id="fallingTrophies"></div>

    <span class="mobile btn-mobile-menu">
        <i class="social iconfont icon-list btn-mobile-menu__icon"></i>
        <i class="social iconfont icon-angleup btn-mobile-close__icon hidden"></i>
    </span>
    
    <header id="panel" class="panel-cover">
        <div class="panel-main">
            <div class="panel-main__inner panel-inverted">
                <div class="panel-main__content">
                    <div class="ih-item circle effect right_to_left">            
                        <a href="#" title="" class="blog-button">
                            <div class="img"><img src="./img/头像.jpg" alt="img" class="js-avatar iUp profilepic"></div>
                            <div class="info iUp">
                                <div class="info-back">
                                    <h2>叶修</h2>
                                    <p>0529 · YEXIU</p>
                                </div>
                            </div>
                        </a>
                    </div>

                    <h1 class="panel-cover__title">
                        <a href="#" target="_blank">叶修</a>
                    </h1>
                    <p class="panel-cover__subtitle panel-subtitle iUp">荣耀玩十年也不会腻</p>
                    <hr class="panel-cover__divider iUp" />
                    <p id="description" class="panel-cover__description iUp">
                        如何得与凉风约，不共尘沙一并来!
                        <br/>
                        <strong>-「中牟道中」</strong>
                    </p>
                    <div class="navigation-wrapper iUp">
                        <div>
                            <nav class="cover-navigation cover-navigation--primary">
                                <ul class="navigation">
                                    <li class="navigation__item">
                                        <a href="html/xinxi.html" class="blog-button">欢迎来到他的世界</a>
                                    </li>
                                </ul>
                            </nav>
                        </div>
                        <div class="iUp">
                            <nav class="cover-navigation navigation--social">
                                <ul class="navigation">
                                    <li class="navigation__item">
                                        <a href="https://github.com/" title="Github" target="_blank">
                                            <i class='social iconfont icon-github'></i>
                                            <span class="label">Github</span>
                                        </a>
                                    </li>
                                    <li class="navigation__item">
                                        <a href="https://www.csdn.net/" title="CSDN" target="_blank">
                                            <i class='social iconfont icon-cnblogs'></i>
                                            <span class="label">CSDN</span>
                                        </a>
                                    </li>
                                    <li class="navigation__item">
                                        <a href="https://www.zhihu.com/signin?next=%2F" title="zhihu">
                                            <i class='social iconfont icon-zhihu'></i>
                                            <span class="label">zhihu</span>
                                        </a>
                                    </li>
                                    <li class="navigation__item">
                                        <a href="https://mail.qq.com/" title="Email">
                                            <i class='social iconfont icon-email'></i>
                                            <span class="label">email</span>
                                        </a>
                                    </li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
            <div class="panel-cover--overlay cover-slate"></div>
        </div>
        <div class="remark iUp">
            <p class="power">© 0529 By
                <a href="#" target="_blank"> YEXIU </a>
            </p>
        </div>
    </header>

    <script type="text/javascript" src="js/jquery.min.js"></script>
    <script type="text/javascript" src="js/fetch.min.js"></script>
    <script type="text/javascript" src="js/main.js"></script>
    
    <script>
        // ========== 掉落枫叶动画效果 ==========
        (function() {
            const leavesContainer = document.getElementById('fallingLeaves');
            if (!leavesContainer) return;
            
            const leafIcons = ['🍁', '🍂', '🍁', '🍂', '🍁', '🍂', '🍁', '🍂'];
            
            function createLeaf() {
                const leaf = document.createElement('div');
                leaf.className = 'leaf';
                const randomIcon = leafIcons[Math.floor(Math.random() * leafIcons.length)];
                leaf.textContent = randomIcon;
                leaf.style.left = Math.random() * 100 + '%';
                leaf.style.fontSize = (16 + Math.random() * 20) + 'px';
                leaf.style.animationDuration = (3 + Math.random() * 6) + 's';
                leaf.style.animationDelay = Math.random() * 5 + 's';
                leaf.style.transform = `rotate(${Math.random() * 360}deg)`;
                leaf.style.opacity = 0.5 + Math.random() * 0.5;
                return leaf;
            }
            
            let leafCount = 0;
            const MAX_LEAVES = 25;
            
            function addLeaf() {
                if (leafCount >= MAX_LEAVES) return;
                const leaf = createLeaf();
                leavesContainer.appendChild(leaf);
                leafCount++;
                leaf.addEventListener('animationend', function() {
                    leaf.remove();
                    leafCount--;
                });
            }
            
            setInterval(() => addLeaf(), 1200);
            for (let i = 0; i < 6; i++) {
                setTimeout(() => addLeaf(), i * 400);
            }
            
            console.log('🍁 枫叶飘落效果已启用');
        })();
        
        // ========== 奖杯掉落动画效果 ==========
        (function() {
            const trophiesContainer = document.getElementById('fallingTrophies');
            if (!trophiesContainer) return;
            
            const trophyIcons = ['🏆', '🏅', '🏆', '🏅', '🏆', '🏅', '🏆'];
            
            function createTrophy() {
                const trophy = document.createElement('div');
                trophy.className = 'trophy';
                const randomIcon = trophyIcons[Math.floor(Math.random() * trophyIcons.length)];
                trophy.textContent = randomIcon;
                trophy.style.left = Math.random() * 100 + '%';
                trophy.style.fontSize = (22 + Math.random() * 18) + 'px';
                trophy.style.animationDuration = (4 + Math.random() * 7) + 's';
                trophy.style.animationDelay = Math.random() * 8 + 's';
                trophy.style.transform = `rotate(${Math.random() * 360}deg)`;
                return trophy;
            }
            
            let trophyCount = 0;
            const MAX_TROPHIES = 20;
            
            function addTrophy() {
                if (trophyCount >= MAX_TROPHIES) return;
                const trophy = createTrophy();
                trophiesContainer.appendChild(trophy);
                trophyCount++;
                trophy.addEventListener('animationend', function() {
                    trophy.remove();
                    trophyCount--;
                });
            }
            
            setInterval(() => addTrophy(), 2000);
            for (let i = 0; i < 5; i++) {
                setTimeout(() => addTrophy(), i * 600);
            }
            
            console.log('🏆 奖杯飘落效果已启用');
        })();
        
        // ========== 鼠标点击狐狸特效 ==========
        (function() {
            // 狐狸表情和文字组合，增加趣味性
            const foxIcons = ['🦊', '✨🦊✨', '🦊💨', '🌟🦊🌟', '🦊', '🦊✨', '💫🦊💫'];
            
            function createFoxEffect(x, y) {
                const fox = document.createElement('div');
                fox.className = 'click-effect';
                
                // 随机选择狐狸图标
                const randomFox = foxIcons[Math.floor(Math.random() * foxIcons.length)];
                fox.textContent = randomFox;
                
                // 设置位置（鼠标点击位置）
                fox.style.left = x + 'px';
                fox.style.top = y + 'px';
                
                // 随机大小
                const size = 24 + Math.random() * 16;
                fox.style.fontSize = size + 'px';
                
                // 随机旋转起始角度
                const startRotate = (Math.random() - 0.5) * 60;
                fox.style.transform = `translate(-50%, -50%) rotate(${startRotate}deg) scale(0.5)`;
                
                document.body.appendChild(fox);
                
                // 动画结束后移除元素
                fox.addEventListener('animationend', function() {
                    fox.remove();
                });
            }
            
            // 监听全局点击事件
            document.addEventListener('click', function(e) {
                // 获取点击坐标
                const x = e.clientX;
                const y = e.clientY;
                createFoxEffect(x, y);
            });
            
            console.log('🦊 鼠标点击狐狸特效已启用');
        })();
    </script>
</body>
</html>
