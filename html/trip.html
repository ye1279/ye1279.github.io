<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>荣耀留言板 | 荣耀之神的空间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1c2e 0%, #2d2a4a 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            padding: 0;
            min-height: 100vh;
            color: #f0f0f0;
        }

        /* ========== 导航栏样式（PC端横向，手机端汉堡折叠） ========== */
        .nav {
            background: rgba(20, 18, 32, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(169, 91, 195, 0.3);
        }
        
        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .nav img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .nav .title {
            font-size: 1.1rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f5e7a3, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        
        /* 汉堡菜单按钮（手机端显示） */
        .menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 28px;
            height: 20px;
            cursor: pointer;
            z-index: 1001;
        }
        
        .menu-toggle span {
            width: 100%;
            height: 3px;
            background: #c9a5f0;
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        
        /* 导航链接容器 */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            transition: all 0.3s ease;
        }
        
        .nav-links a {
            color: #e0d4ff;
            text-decoration: none;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        
        .nav-links a:hover {
            color: #c084fc;
        }
        
        .nav-links p {
            display: inline;
        }
        
        /* 手机端样式 */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }
            
            .nav-links {
                position: fixed;
                top: 64px;
                left: -100%;
                width: 70%;
                height: calc(100vh - 64px);
                background: rgba(20, 18, 32, 0.98);
                backdrop-filter: blur(15px);
                flex-direction: column;
                align-items: flex-start;
                padding: 20px 25px;
                gap: 15px;
                transition: left 0.3s ease;
                z-index: 999;
                border-right: 1px solid rgba(169, 91, 195, 0.3);
                overflow-y: auto;
            }
            
            .nav-links.active {
                left: 0;
            }
            
            .nav-links a {
                width: 100%;
                padding: 10px 0;
                border-bottom: 1px solid rgba(169, 91, 195, 0.2);
                font-size: 1rem;
            }
            
            .nav-links a:last-child {
                border-bottom: none;
            }
            
            /* 汉堡菜单动画（点击后变成X） */
            .menu-toggle.active span:nth-child(1) {
                transform: rotate(45deg) translate(6px, 6px);
            }
            
            .menu-toggle.active span:nth-child(2) {
                opacity: 0;
            }
            
            .menu-toggle.active span:nth-child(3) {
                transform: rotate(-45deg) translate(5px, -6px);
            }
            
            .nav .title {
                font-size: 1rem;
            }
        }
        
        /* PC端保持原有样式 */
        @media (min-width: 769px) {
            .nav-links {
                display: flex !important;
            }
        }

        /* ========== 主容器 ========== */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* 页面标题区 */
        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .page-header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #f5e7a3, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .page-header p {
            color: #b6a9e0;
            font-size: 0.85rem;
        }
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(169, 91, 195, 0.6), transparent);
            margin: 15px 0 25px;
        }

        /* ========== Twikoo 评论框样式 - 手机优化 ========== */
        #tcomment {
            background: rgba(30, 28, 45, 0.4);
            border-radius: 24px;
            padding: 8px 4px 20px 4px;
            min-height: 400px;
        }
        
        /* 确保评论容器可见且有合适宽度 */
        .twikoo {
            width: 100% !important;
            overflow-x: hidden !important;
        }
        
        /* 隐藏邮箱和网址输入框 */
        .twikoo .tk-field-mail,
        .twikoo .tk-field-url,
        .twikoo .tk-input-mail,
        .twikoo .tk-input-url,
        .twikoo .el-form-item__label[for="mail"],
        .twikoo .el-form-item__label[for="url"] {
            display: none !important;
        }
        
        /* 调整昵称输入框占满整行 */
        .twikoo .tk-field-nick {
            width: 100% !important;
            display: block !important;
        }
        .twikoo .tk-input-nick {
            width: 100% !important;
        }
        
        /* 主要评论框样式 - 移动端适配 */
        .twikoo .tk-comment,
        .twikoo .tk-submit,
        .twikoo .tk-replies {
            background: rgba(34, 30, 54, 0.7) !important;
            backdrop-filter: blur(4px);
            border-radius: 20px !important;
            border: 1px solid rgba(169, 91, 195, 0.2) !important;
            margin-bottom: 16px !important;
        }
        
        /* 评论列表区域 */
        .twikoo .tk-comments {
            margin-top: 20px;
        }
        
        /* 单条评论卡片 */
        .twikoo .tk-row {
            background: rgba(40, 36, 58, 0.6) !important;
            border-radius: 18px !important;
            margin-bottom: 16px !important;
            padding: 14px !important;
            border: 1px solid rgba(169, 91, 195, 0.15) !important;
        }
        
        /* 输入框样式 */
        .twikoo .tk-input,
        .twikoo .el-textarea__inner,
        .twikoo .el-input__inner {
            background-color: #2a253e !important;
            border-color: #4a3f6e !important;
            color: #f3eefc !important;
            border-radius: 20px !important;
            font-size: 14px !important;
        }
        
        /* 输入框聚焦 */
        .twikoo .tk-input:focus,
        .twikoo .el-textarea__inner:focus {
            border-color: #a95bc3 !important;
            box-shadow: 0 0 0 2px rgba(169, 91, 195, 0.3) !important;
        }
        
        /* 按钮样式 */
        .twikoo .tk-btn-primary,
        .twikoo .el-button--primary {
            background: linear-gradient(95deg, #a95bc3, #7b2c9e) !important;
            border: none !important;
            border-radius: 40px !important;
            padding: 8px 20px !important;
            font-weight: bold !important;
            font-size: 14px !important;
        }
        
        .twikoo .tk-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(169, 91, 195, 0.4);
        }
        
        /* 文字颜色 */
        .twikoo .tk-nick,
        .twikoo .tk-nick a,
        .twikoo .tk-content p,
        .twikoo .tk-time {
            color: #e0d4ff !important;
        }
        
        .twikoo .tk-content {
            font-size: 14px;
            line-height: 1.5;
        }
        
        .twikoo .tk-reply-link {
            color: #c084fc !important;
            font-size: 13px;
        }
        
        .twikoo .tk-badge {
            background: #4a3f6e !important;
            color: #e0d4ff !important;
        }
        
        /* 分页器样式 */
        .twikoo .tk-page {
            margin-top: 20px;
            text-align: center;
        }
        .twikoo .el-pagination {
            justify-content: center;
        }
        .twikoo .el-pagination button,
        .twikoo .el-pagination .el-pager li {
            background: rgba(34, 30, 54, 0.8) !important;
            color: #e0d4ff !important;
            border-radius: 8px !important;
            margin: 0 4px !important;
        }
        .twikoo .el-pagination .el-pager li.active {
            background: #a95bc3 !important;
            color: white !important;
        }
        
        /* 加载提示 */
        .twikoo .tk-loading {
            color: #c9a5f0;
            text-align: center;
            padding: 30px;
        }
        
        /* 空状态提示 */
        .twikoo .tk-empty {
            text-align: center;
            padding: 40px;
            color: #b6a9e0;
            background: rgba(34, 30, 54, 0.5);
            border-radius: 24px;
        }
        
        /* 手机端滚动条优化 */
        .twikoo ::-webkit-scrollbar {
            width: 4px;
        }
        .twikoo ::-webkit-scrollbar-track {
            background: #2b2342;
            border-radius: 10px;
        }
        .twikoo ::-webkit-scrollbar-thumb {
            background: #a95bc3;
            border-radius: 10px;
        }
        
        /* 评论框表单布局 - 移动端优化 */
        .twikoo .el-form-item {
            margin-bottom: 16px !important;
        }
        
        /* 确保昵称输入框可见 */
        .twikoo .tk-field-nick .el-form-item__label {
            color: #c9a5f0 !important;
            font-size: 13px !important;
        }
        
        /* 隐藏不必要的元素 */
        .twikoo .tk-preview {
            display: none !important;
        }
        
        /* 确保评论列表正确显示 */
        .twikoo .tk-replies {
            margin-left: 40px !important;
            border-left: 2px solid rgba(169, 91, 195, 0.3) !important;
            padding-left: 12px !important;
        }
        
        /* 手机端缩小边距 */
        @media (max-width: 768px) {
            .main-container {
                padding: 15px 12px 30px;
            }
            .page-header h1 {
                font-size: 1.5rem;
            }
            #tcomment {
                padding: 5px 2px 15px 2px;
            }
            .twikoo .tk-row {
                padding: 12px !important;
            }
            .twikoo .tk-replies {
                margin-left: 20px !important;
                padding-left: 8px !important;
            }
            .twikoo .tk-content {
                font-size: 13px;
            }
            .twikoo .tk-nick {
                font-size: 14px;
            }
            .twikoo .tk-time {
                font-size: 11px;
            }
        }
        
        /* 小屏手机进一步优化 */
        @media (max-width: 480px) {
            .twikoo .tk-replies {
                margin-left: 12px !important;
            }
            .twikoo .tk-row {
                padding: 10px !important;
            }
        }
        
        footer {
            text-align: center;
            padding: 20px 16px;
            background: rgba(44, 46, 51, 0.5);
            margin-top: 40px;
            color: #9a8fc2;
            font-size: 0.7rem;
        }
        footer a {
            color: #c084fc;
            text-decoration: none;
        }
    </style>
</head>
<body>

<!-- ========== 头部导航栏（PC端横向，手机端汉堡折叠） ========== -->
<div class="nav">
    <div class="nav-left">
        <img src="../img/头像.jpg" alt="logo 图">
        <span class="title">荣耀之神的空间</span>
    </div>
    <div class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="nav-links" id="navLinks">
        <a href="xinxi.html"><p>小叶的资料</p></a>
        <a href="collect.html"><p>日常衣橱</p></a>
        <a href="interest.html"><p>古风衣橱</p></a>
        <a href="food.html"><p>西幻衣橱</p></a>
        <a href="tongren.html"><p>同人衣橱</p></a>
        <a href="trip.html"><p>留言板</p></a>
        <a href="search.html"><p>导航</p></a>
        <a href="../index.html"><p>首页</p></a>
    </div>
</div>

<!-- ========== 主内容区 ========== -->
<div class="main-container">
    <div class="page-header">
        <h1>✨ 荣耀留言板 ✨</h1>
        <p>在你眼中，叶修是什么样的人？</p>
        <p> 那些关于你和叶修的故事</p>
        
        <div class="divider"></div>
    </div>

    <!-- Twikoo 评论组件容器 -->
    <div id="tcomment"></div>
</div>

<footer>
    <p>© 0529 By YeXiu | Powered by Twikoo 评论系统</p>
</footer>

<!-- ========== Twikoo 脚本 ========== -->
<script src="https://cdn.staticfile.org/twikoo/1.6.39/twikoo.all.min.js"></script>

<script>
    // ========== 汉堡菜单功能 ==========
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    
    if (menuToggle && navLinks) {
        menuToggle.addEventListener('click', function() {
            menuToggle.classList.toggle('active');
            navLinks.classList.toggle('active');
        });
        
        // 点击导航链接后自动关闭菜单（手机端）
        const navItems = navLinks.querySelectorAll('a');
        navItems.forEach(item => {
            item.addEventListener('click', function() {
                if (window.innerWidth <= 768) {
                    menuToggle.classList.remove('active');
                    navLinks.classList.remove('active');
                }
            });
        });
        
        // 点击页面其他区域关闭菜单
        document.addEventListener('click', function(e) {
            if (window.innerWidth <= 768) {
                if (!navLinks.contains(e.target) && !menuToggle.contains(e.target)) {
                    menuToggle.classList.remove('active');
                    navLinks.classList.remove('active');
                }
            }
        });
    }
    
    // 你的 Twikoo 后端地址
    const TWIKOO_ENV_ID = 'https://ye-hazel.vercel.app/api/twikoo';
   // const TWIKOO_ENV_ID = 'https://calle1.netlify.app/.netlify/functions/twikoo';
    
    // 强制隐藏邮箱和网址字段的函数（更彻底）
    function hideMailAndUrlFields() {
        try {
            // 隐藏邮箱和网址输入框的各种可能选择器
            const selectors = [
                '.tk-field-mail', '.tk-field-url',
                '.tk-input-mail', '.tk-input-url',
                '.el-form-item__content .tk-input-mail',
                '.el-form-item__content .tk-input-url',
                'input[placeholder*="邮箱"]', 'input[placeholder*="邮件"]',
                'input[placeholder*="网址"]', 'input[placeholder*="网站"]',
                '.el-form-item[data-prop="mail"]', '.el-form-item[data-prop="url"]'
            ];
            
            selectors.forEach(selector => {
                document.querySelectorAll(selector).forEach(el => {
                    if (el.style) el.style.display = 'none';
                    // 如果是表单项，隐藏整个表单项
                    const formItem = el.closest('.el-form-item');
                    if (formItem) formItem.style.display = 'none';
                });
            });
            
            // 隐藏包含"邮箱"或"网址"文字的标签
            document.querySelectorAll('.twikoo .el-form-item__label, .twikoo label').forEach(label => {
                const text = label.textContent || '';
                if (text.includes('邮箱') || text.includes('邮件') || text.includes('网址') || text.includes('网站')) {
                    const formItem = label.closest('.el-form-item');
                    if (formItem) formItem.style.display = 'none';
                }
            });
            
            // 让昵称框占满宽度并确保可见
            const nickField = document.querySelector('.tk-field-nick');
            if (nickField) {
                nickField.style.width = '100%';
                nickField.style.display = 'block';
                const nickFormItem = nickField.closest('.el-form-item');
                if (nickFormItem) nickFormItem.style.display = 'block';
            }
            
            // 确保评论输入区域可见
            const commentField = document.querySelector('.tk-field-comment');
            if (commentField) {
                commentField.style.display = 'block';
                commentField.style.width = '100%';
            }
            
            console.log('✅ 已隐藏邮箱和网址字段');
        } catch(e) {
            console.warn('隐藏字段时出错:', e);
        }
    }
    
    // 初始化 Twikoo
    twikoo.init({
        envId: TWIKOO_ENV_ID,
        el: '#tcomment',
        path: window.location.pathname,
        lang: 'zh-CN'
    }).then(() => {
        console.log('✅ Twikoo 评论系统加载成功');
        
        // 等待 DOM 完全渲染后隐藏字段
        setTimeout(() => {
            hideMailAndUrlFields();
        }, 200);
        
        // 多次尝试确保隐藏成功（因为 Twikoo 可能动态渲染）
        const interval = setInterval(() => {
            hideMailAndUrlFields();
            // 检查是否已经有评论显示
            const commentsExist = document.querySelector('.tk-comments .tk-row');
            if (commentsExist) {
                console.log('✅ 评论已成功显示');
            }
        }, 500);
        
        // 10秒后停止轮询
        setTimeout(() => clearInterval(interval), 10000);
        
    }).catch(err => {
        console.error('❌ Twikoo 加载失败:', err);
        const container = document.getElementById('tcomment');
        if (container) {
            container.innerHTML = `
                <div style="text-align: center; padding: 40px 20px; background: rgba(34,30,54,0.6); border-radius: 28px;">
                    <p style="color: #ffb2b2; font-size: 16px;">⚠️ 评论系统加载失败</p>
                    <p style="font-size: 13px; margin-top: 12px; color: #b6a9e0;">请检查网络连接后刷新页面重试</p>
                    <button onclick="location.reload()" style="margin-top: 20px; background: #a95bc3; border: none; padding: 8px 24px; border-radius: 30px; color: white; cursor: pointer;">刷新页面</button>
                </div>
            `;
        }
    });
    
    // 监听 DOM 变化，确保动态加载的字段也被隐藏
    let observerTimer = null;
    const observer = new MutationObserver(function(mutations) {
        // 防抖，避免频繁执行
        if (observerTimer) clearTimeout(observerTimer);
        observerTimer = setTimeout(() => {
            hideMailAndUrlFields();
        }, 100);
    });
    observer.observe(document.body, {
        childList: true,
        subtree: true
    });
    
    // 页面加载完成后执行一次
    window.addEventListener('load', function() {
        hideMailAndUrlFields();
    });
    
    // 处理移动端触摸滚动优化
    document.addEventListener('touchstart', function() {}, { passive: true });
</script>
</body>
</html>
