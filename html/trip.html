<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>荣耀留言板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1c2e 0%, #2d2a4a 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            padding: 30px 20px;
            min-height: 100vh;
            color: #f0f0f0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(30, 28, 45, 0.65);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            padding: 24px 28px 36px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px dashed rgba(169, 91, 195, 0.5);
            padding-bottom: 20px;
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #f5e7a3, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .cloud-status {
            background: #1f4f3a;
            border-radius: 60px;
            display: inline-block;
            padding: 4px 16px;
            font-size: 0.7rem;
            margin-top: 10px;
            color: #a3f5d9;
        }
        .admin-badge {
            background: #ff9e3e;
            color: #1a1c2e;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 10px;
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 18px;
        }
        input, textarea {
            width: 100%;
            background: #2a253e;
            border: 1px solid #4a3f6e;
            border-radius: 24px;
            padding: 12px 18px;
            color: #f3eefc;
            font-size: 0.95rem;
            outline: none;
            font-family: inherit;
        }
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        .image-upload-area {
            background: #2a253e;
            border: 2px dashed #4a3f6e;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 18px;
        }
        .image-upload-area:hover {
            border-color: #a95bc3;
            background: #332b50;
        }
        .image-upload-area span {
            color: #9a8fc2;
            font-size: 0.85rem;
        }
        .image-preview {
            display: none;
            margin-top: 15px;
            position: relative;
            display: inline-block;
        }
        .image-preview img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 12px;
            border: 2px solid #a95bc3;
        }
        .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff5e5e;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            color: white;
        }
        .submit-btn {
            background: linear-gradient(95deg, #a95bc3, #7b2c9e);
            border: none;
            padding: 12px 26px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .submit-btn:hover {
            transform: scale(1.02);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .messages-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
            max-height: 550px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .messages-list::-webkit-scrollbar {
            width: 5px;
        }
        .messages-list::-webkit-scrollbar-track {
            background: #2b2342;
            border-radius: 10px;
        }
        .messages-list::-webkit-scrollbar-thumb {
            background: #a95bc3;
            border-radius: 10px;
        }
        .message-card {
            background: rgba(34, 30, 54, 0.8);
            border-radius: 24px;
            padding: 18px 22px;
            border: 1px solid rgba(169, 91, 195, 0.2);
            transition: all 0.2s;
        }
        .message-card:hover {
            border-color: #a95bc3;
            background: rgba(45, 38, 72, 0.9);
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .message-author {
            font-weight: bold;
            font-size: 1.1rem;
            color: #c9a5f0;
        }
        .message-time {
            font-size: 0.7rem;
            color: #9a8fc2;
        }
        .message-content {
            margin: 12px 0;
            line-height: 1.5;
            word-break: break-word;
        }
        .message-image {
            margin-top: 12px;
            max-width: 100%;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .message-image:hover {
            transform: scale(1.02);
        }
        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.7rem;
            margin-top: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            transition: 0.2s;
        }
        .delete-my {
            color: #ff9e9e;
        }
        .delete-my:hover {
            background: rgba(255, 100, 100, 0.2);
        }
        .delete-admin {
            color: #ff5e5e;
            font-weight: bold;
        }
        .delete-admin:hover {
            background: rgba(255, 80, 80, 0.3);
        }
        .admin-delete-hint {
            font-size: 0.6rem;
            color: #ff9e9e;
            margin-left: 8px;
        }
        .empty-state, .loading {
            text-align: center;
            padding: 48px;
            color: #b6a9e0;
        }
        footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.75rem;
            color: #7a6ea5;
        }
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }
        .image-modal img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 12px;
        }
        @media (max-width: 600px) {
            .container {
                padding: 16px;
            }
            .message-card {
                padding: 14px;
            }
        }
        
        /* 管理员验证弹窗 */
        .admin-prompt {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-prompt-box {
            background: #2a253e;
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            border: 1px solid #a95bc3;
        }
        .admin-prompt-box input {
            margin: 15px 0;
            width: 200px;
        }
        .admin-prompt-box button {
            background: #a95bc3;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✨ 荣耀留言板 ✨</h1>
        <p>在你眼中，叶修是什么样的人？</p>
        <div class="cloud-status" id="status">✅ 云端在线</div>
    </div>

    <div class="form-group">
        <input type="text" id="authorName" placeholder="你的昵称" maxlength="30">
    </div>
    
    <div class="image-upload-area" id="uploadArea">
        <span>📷 点击上传图片（支持 JPG/PNG/GIF，最大5MB）</span>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
    </div>
    <div class="image-preview" id="imagePreview" style="display: none;">
        <img id="previewImg" alt="预览">
        <div class="remove-image" id="removeImageBtn">✕</div>
    </div>
    
    <div class="form-group">
        <textarea id="messageText" placeholder="写下一段话...（可选）" maxlength="500"></textarea>
    </div>
    <button class="submit-btn" id="publishBtn">📨 发布留言</button>

    <div class="messages-list" id="messagesList">
        <div class="loading">加载留言中...</div>
    </div>
    <footer>💡 支持图片上传 | 管理员可删除任何不当留言</footer>
</div>

<div id="imageViewer" class="image-modal" onclick="this.style.display='none'">
    <img id="viewerImg" alt="">
</div>

<script>
    // ==================== 配置 ====================
    const API_BASE = 'https://mockapi.io/clone/69ce82af33a09f831b7d9e53';
    const API_URL = `${API_BASE}/messages`;
    
    // 管理员密码（你可以修改这个密码）
    const ADMIN_PASSWORD = 'calle0529';  // 修改成你想要的密码
    
    // 免费图床 API
    const IMGBB_UPLOAD_URL = 'https://freeimage.host/api/1/upload';
    const IMGBB_API_KEY = '6d207e02198a847aa98d0a2a901485be';
    // ===========================================
    
    // 访客标识
    function getVisitorId() {
        let id = localStorage.getItem('visitor_id');
        if (!id) {
            id = 'v_' + Date.now() + '_' + Math.random().toString(36).substr(2, 10);
            localStorage.setItem('visitor_id', id);
        }
        return id;
    }
    const visitorId = getVisitorId();
    
    // 管理员状态
    let isAdmin = sessionStorage.getItem('isAdmin') === 'true';
    
    // DOM 元素
    const messagesList = document.getElementById('messagesList');
    const authorInput = document.getElementById('authorName');
    const contentInput = document.getElementById('messageText');
    const publishBtn = document.getElementById('publishBtn');
    const statusDiv = document.getElementById('status');
    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('imagePreview');
    const previewImg = document.getElementById('previewImg');
    const removeImageBtn = document.getElementById('removeImageBtn');
    
    let currentImageUrl = null;
    let isUploading = false;
    
    // 管理员验证弹窗
    function promptAdminPassword() {
        return new Promise((resolve) => {
            const overlay = document.createElement('div');
            overlay.className = 'admin-prompt';
            overlay.innerHTML = `
                <div class="admin-prompt-box">
                    <h3>🔐 管理员验证</h3>
                    <input type="password" id="adminPasswordInput" placeholder="输入管理员密码">
                    <br>
                    <button id="adminConfirmBtn">确认</button>
                    <button id="adminCancelBtn" style="background:#555; margin-left:10px;">取消</button>
                </div>
            `;
            document.body.appendChild(overlay);
            
            const input = overlay.querySelector('#adminPasswordInput');
            const confirmBtn = overlay.querySelector('#adminConfirmBtn');
            const cancelBtn = overlay.querySelector('#adminCancelBtn');
            
            confirmBtn.onclick = () => {
                const pwd = input.value;
                overlay.remove();
                resolve(pwd === ADMIN_PASSWORD);
            };
            cancelBtn.onclick = () => {
                overlay.remove();
                resolve(false);
            };
            input.onkeypress = (e) => {
                if (e.key === 'Enter') confirmBtn.click();
            };
            input.focus();
        });
    }
    
    // 成为管理员
    async function becomeAdmin() {
        const success = await promptAdminPassword();
        if (success) {
            sessionStorage.setItem('isAdmin', 'true');
            isAdmin = true;
            showTip('✅ 管理员模式已启用，现在可以删除任何留言', '#a95bc3');
            await loadMessages();
        } else {
            showTip('❌ 密码错误', '#ff5e5e');
        }
    }
    
    // 上传图片
    function uploadImage(file) {
        return new Promise((resolve, reject) => {
            const formData = new FormData();
            formData.append('source', file);
            formData.append('type', 'file');
            formData.append('action', 'upload');
            formData.append('format', 'json');
            
            fetch(IMGBB_UPLOAD_URL, {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data && data.image && data.image.url) {
                    resolve(data.image.url);
                } else if (data && data.image && data.image.display_url) {
                    resolve(data.image.display_url);
                } else {
                    reject(new Error('上传失败'));
                }
            })
            .catch(reject);
        });
    }
    
    // 上传区域点击
    uploadArea.addEventListener('click', () => {
        imageInput.click();
    });
    
    // 选择图片
    imageInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        if (file.size > 5 * 1024 * 1024) {
            alert('图片不能超过5MB');
            return;
        }
        
        if (!file.type.startsWith('image/')) {
            alert('请选择图片文件');
            return;
        }
        
        const reader = new FileReader();
        reader.onload = function(evt) {
            previewImg.src = evt.target.result;
            imagePreview.style.display = 'inline-block';
        };
        reader.readAsDataURL(file);
        
        statusDiv.innerHTML = "📤 上传图片中...";
        statusDiv.style.background = "#4a3f6e";
        isUploading = true;
        
        try {
            const imageUrl = await uploadImage(file);
            currentImageUrl = imageUrl;
            statusDiv.innerHTML = "✅ 图片已上传";
            statusDiv.style.background = "#1f4f3a";
            setTimeout(() => {
                if (statusDiv.innerHTML === "✅ 图片已上传") {
                    statusDiv.innerHTML = "✅ 云端在线 · 实时共享";
                }
            }, 2000);
        } catch (error) {
            console.error('上传失败:', error);
            alert('图片上传失败，请重试');
            imagePreview.style.display = 'none';
            currentImageUrl = null;
            statusDiv.innerHTML = "✅ 云端在线";
            statusDiv.style.background = "#1f4f3a";
        } finally {
            isUploading = false;
        }
    });
    
    removeImageBtn.addEventListener('click', () => {
        imagePreview.style.display = 'none';
        previewImg.src = '';
        currentImageUrl = null;
        imageInput.value = '';
    });
    
    // 加载留言
    async function loadMessages() {
        try {
            messagesList.innerHTML = '<div class="loading">📡 加载留言中...</div>';
            
            const response = await fetch(API_URL);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const messages = await response.json();
            
            if (!messages || messages.length === 0) {
                messagesList.innerHTML = '<div class="empty-state">✨ 暂无留言，来写第一句吧～</div>';
                return;
            }
            
            messages.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            let html = '';
            for (const msg of messages) {
                const author = escapeHtml(msg.author || '匿名');
                const content = escapeHtml(msg.content || '').replace(/\n/g, '<br>');
                const time = msg.createdAt ? new Date(msg.createdAt).toLocaleString('zh-CN') : '刚刚';
                const isMyMessage = (msg.visitorId === visitorId);
                const imageUrl = msg.imageUrl;
                
                // 删除按钮逻辑
                let deleteButton = '';
                if (isAdmin) {
                    deleteButton = `<button class="delete-btn delete-admin" onclick="deleteMessageAsAdmin('${msg.id}')">🗑️ 管理员删除</button>`;
                } else if (isMyMessage) {
                    deleteButton = `<button class="delete-btn delete-my" onclick="deleteMyMessage('${msg.id}')">🗑️ 删除我的留言</button>`;
                }
                
                html += `
                    <div class="message-card" data-id="${msg.id}">
                        <div class="message-header">
                            <span class="message-author">🧙 ${author}${isAdmin ? '<span class="admin-badge">👑 管理员</span>' : ''}</span>
                            <span class="message-time">📅 ${time}</span>
                        </div>
                        ${content ? `<div class="message-content">${content}</div>` : ''}
                        ${imageUrl ? `<img src="${imageUrl}" class="message-image" onclick="event.stopPropagation();viewImage('${imageUrl}')" alt="留言图片">` : ''}
                        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                            ${deleteButton}
                        </div>
                    </div>
                `;
            }
            messagesList.innerHTML = html;
            statusDiv.innerHTML = "✅ 云端在线 · 实时共享";
        } catch (error) {
            console.error('加载失败:', error);
            messagesList.innerHTML = '<div class="empty-state">⚠️ 加载失败，请刷新页面重试</div>';
            statusDiv.innerHTML = "⚠️ 连接异常，刷新重试";
        }
    }
    
    // 发布留言
    async function publishMessage() {
        const author = authorInput.value.trim();
        const content = contentInput.value.trim();
        
        if (!author) {
            alert("请填写昵称");
            return;
        }
        if (!content && !currentImageUrl) {
            alert("请填写留言内容或上传图片");
            return;
        }
        if (author.length > 30) {
            alert("昵称不能超过30个字");
            return;
        }
        
        publishBtn.disabled = true;
        publishBtn.textContent = "发布中...";
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    author: author,
                    content: content || '',
                    imageUrl: currentImageUrl || '',
                    visitorId: visitorId,
                    createdAt: new Date().toISOString()
                })
            });
            
            if (!response.ok) {
                throw new Error(`发布失败: ${response.status}`);
            }
            
            authorInput.value = '';
            contentInput.value = '';
            imagePreview.style.display = 'none';
            previewImg.src = '';
            currentImageUrl = null;
            imageInput.value = '';
            await loadMessages();
            
            showTip('✨ 留言发布成功！所有人可见 ✨', '#a95bc3');
            
        } catch (error) {
            console.error('发布失败:', error);
            alert('发布失败：' + error.message + '\n请稍后重试');
        } finally {
            publishBtn.disabled = false;
            publishBtn.textContent = "📨 发布留言";
        }
    }
    
    // 普通用户删除自己的留言
    window.deleteMyMessage = async function(id) {
        if (!confirm('确定删除这条留言吗？删除后无法恢复。')) return;
        
        try {
            const response = await fetch(`${API_URL}/${id}`, {
                method: 'DELETE'
            });
            
            if (!response.ok) {
                throw new Error('删除失败');
            }
            
            showTip('🗑️ 留言已删除', '#ff9e9e');
            await loadMessages();
        } catch (error) {
            console.error('删除失败:', error);
            alert('删除失败，请重试');
        }
    };
    
    // 管理员删除任何留言
    window.deleteMessageAsAdmin = async function(id) {
        if (!confirm('⚠️ 管理员删除：确定删除这条留言吗？删除后无法恢复。')) return;
        
        try {
            const response = await fetch(`${API_URL}/${id}`, {
                method: 'DELETE'
            });
            
            if (!response.ok) {
                throw new Error('删除失败');
            }
            
            showTip('🗑️ 管理员已删除该留言', '#ff5e5e');
            await loadMessages();
        } catch (error) {
            console.error('删除失败:', error);
            alert('删除失败，请重试');
        }
    };
    
    window.viewImage = function(url) {
        const viewer = document.getElementById('imageViewer');
        const viewerImg = document.getElementById('viewerImg');
        viewerImg.src = url;
        viewer.style.display = 'flex';
    };
    
    function showTip(message, color) {
        const tip = document.createElement('div');
        tip.textContent = message;
        tip.style.position = 'fixed';
        tip.style.bottom = '20px';
        tip.style.left = '50%';
        tip.style.transform = 'translateX(-50%)';
        tip.style.backgroundColor = color || '#a95bc3';
        tip.style.color = 'white';
        tip.style.padding = '10px 24px';
        tip.style.borderRadius = '40px';
        tip.style.zIndex = '999';
        tip.style.fontSize = '14px';
        document.body.appendChild(tip);
        setTimeout(() => tip.remove(), 2500);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // 绑定事件
    publishBtn.addEventListener('click', publishMessage);
    contentInput.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
            e.preventDefault();
            publishMessage();
        }
    });
    
    // 检查是否有管理员按钮（在页面底部添加一个隐藏的管理员入口）
    const adminEntry = document.createElement('div');
    adminEntry.style.position = 'fixed';
    adminEntry.style.bottom = '10px';
    adminEntry.style.left = '10px';
    adminEntry.style.background = 'rgba(0,0,0,0.5)';
    adminEntry.style.padding = '4px 12px';
    adminEntry.style.borderRadius = '20px';
    adminEntry.style.fontSize = '12px';
    adminEntry.style.cursor = 'pointer';
    adminEntry.style.zIndex = '9999';
    adminEntry.innerHTML = isAdmin ? '👑 管理员模式' : '🔑 管理员入口';
    adminEntry.onclick = () => {
        if (isAdmin) {
            showTip('当前已是管理员模式', '#a95bc3');
        } else {
            becomeAdmin();
        }
    };
    document.body.appendChild(adminEntry);
    
    // 加载留言
    loadMessages();
    setInterval(loadMessages, 30000);
</script>
</body>
