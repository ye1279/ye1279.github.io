    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1c2e 0%, #2d2a4a 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            padding: 0;
            min-height: 100vh;
            color: #f0f0f0;
        }

        /* ========== 导航栏样式 ========== */
        .nav {
            background: rgba(20, 18, 32, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(169, 91, 195, 0.3);
        }
        .nav img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }
        .nav .title {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f5e7a3, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav a {
            color: #e0d4ff;
            text-decoration: none;
            transition: 0.2s;
        }
        .nav a:hover {
            color: #c084fc;
        }
        .nav p {
            display: inline;
        }

        /* ========== 主容器 ========== */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 24px 50px;
        }

        /* 页面标题区 */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .page-header h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #f5e7a3, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .page-header p {
            color: #b6a9e0;
            font-size: 0.95rem;
        }
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(169, 91, 195, 0.6), transparent);
            margin: 20px 0 30px;
        }

        /* ========== Twikoo 评论框样式 ========== */
        #tcomment {
            background: rgba(30, 28, 45, 0.5);
            border-radius: 28px;
            padding: 10px 5px 20px 5px;
        }
        
        /* 隐藏邮箱和网址输入框 */
        .twikoo .tk-field-mail,
        .twikoo .tk-field-url,
        .twikoo .tk-input-mail,
        .twikoo .tk-input-url {
            display: none !important;
        }
        
        /* 调整昵称输入框占满整行 */
        .twikoo .tk-field-nick {
            width: 100% !important;
        }
        .twikoo .tk-input-nick {
            width: 100% !important;
        }
        
        /* 主要评论框样式 */
        .twikoo .tk-comment,
        .twikoo .tk-submit,
        .twikoo .tk-replies,
        .twikoo .tk-content {
            background: rgba(34, 30, 54, 0.7) !important;
            backdrop-filter: blur(4px);
            border-radius: 20px !important;
            border: 1px solid rgba(169, 91, 195, 0.2) !important;
        }
        
        .twikoo .tk-input,
        .twikoo .el-textarea__inner,
        .twikoo .el-input__inner {
            background-color: #2a253e !important;
            border-color: #4a3f6e !important;
            color: #f3eefc !important;
            border-radius: 20px !important;
        }
        
        .twikoo .tk-input:focus,
        .twikoo .el-textarea__inner:focus {
            border-color: #a95bc3 !important;
            box-shadow: 0 0 0 2px rgba(169, 91, 195, 0.3) !important;
        }
        
        .twikoo .tk-btn-primary,
        .twikoo .el-button--primary {
            background: linear-gradient(95deg, #a95bc3, #7b2c9e) !important;
            border: none !important;
            border-radius: 40px !important;
            padding: 8px 22px !important;
            font-weight: bold !important;
        }
        
        .twikoo .tk-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(169, 91, 195, 0.4);
        }
        
        .twikoo .tk-nick,
        .twikoo .tk-nick a,
        .twikoo .tk-content p,
        .twikoo .tk-time {
            color: #e0d4ff !important;
        }
        
        .twikoo .tk-reply-link {
            color: #c084fc !important;
        }
        
        .twikoo .tk-row {
            background: transparent !important;
        }
        
        .twikoo .tk-badge {
            background: #4a3f6e !important;
            color: #e0d4ff !important;
        }
        
        /* 滚动条 */
        .twikoo ::-webkit-scrollbar {
            width: 5px;
        }
        .twikoo ::-webkit-scrollbar-track {
            background: #2b2342;
            border-radius: 10px;
        }
        .twikoo ::-webkit-scrollbar-thumb {
            background: #a95bc3;
            border-radius: 10px;
        }

        footer {
            text-align: center;
            padding: 30px 20px 20px;
            background: rgba(44, 46, 51, 0.5);
            margin-top: 50px;
            color: #9a8fc2;
            font-size: 0.8rem;
        }
        footer a {
            color: #c084fc;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .nav {
                padding: 10px 16px;
                gap: 12px;
            }
            .nav .title {
                font-size: 1rem;
            }
            .main-container {
                padding: 20px 16px 30px;
            }
            .page-header h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

        <h1>✨ 荣耀留言板 ✨</h1>
        <p>在你眼中，叶修是什么样的人？</p>

<!-- ========== Twikoo 脚本 ========== -->
<script src="https://cdn.staticfile.org/twikoo/1.6.39/twikoo.all.min.js"></script>

<script>
    // 你的 Twikoo 后端地址
    const TWIKOO_ENV_ID = 'https://calle1.netlify.app/.netlify/functions/twikoo';
    
    // 初始化 Twikoo（不配置任何图片上传相关参数，使用默认行为）
    twikoo.init({
        envId: TWIKOO_ENV_ID,
        el: '#tcomment',
        path: window.location.pathname,
        lang: 'zh-CN'
    }).then(() => {
        console.log('✅ Twikoo 评论系统加载成功');
        setTimeout(() => {
            hideMailAndUrlFields();
        }, 500);
    }).catch(err => {
        console.error('❌ Twikoo 加载失败:', err);
        document.getElementById('tcomment').innerHTML = `
            <div style="text-align: center; padding: 40px; background: rgba(34,30,54,0.6); border-radius: 28px;">
                <p style="color: #ffb2b2;">⚠️ 评论系统加载失败，请稍后刷新重试</p>
                <p style="font-size: 13px; margin-top: 10px;">如果问题持续存在，请检查网络或联系管理员。</p>
            </div>
        `;
    });
    
    // 强制隐藏邮箱和网址字段的函数
    function hideMailAndUrlFields() {
        // 隐藏邮箱和网址输入框
        const mailFields = document.querySelectorAll('.tk-field-mail, .tk-input-mail');
        const urlFields = document.querySelectorAll('.tk-field-url, .tk-input-url');
        
        mailFields.forEach(el => {
            if (el.style) el.style.display = 'none';
        });
        urlFields.forEach(el => {
            if (el.style) el.style.display = 'none';
        });
        
        // 隐藏包含"邮箱"文字的标签行
        const labels = document.querySelectorAll('.twikoo label');
        labels.forEach(label => {
            if (label.textContent.includes('邮箱') || label.textContent.includes('邮件') || label.textContent.includes('网址')) {
                let parent = label.closest('.el-form-item');
                if (parent) parent.style.display = 'none';
            }
        });
        
        // 让昵称框占满宽度
        const nickField = document.querySelector('.tk-field-nick');
        if (nickField) {
            nickField.style.width = '100%';
        }
        
        console.log('已隐藏邮箱和网址字段');
    }
    
    // 监听 DOM 变化，确保动态加载的字段也被隐藏
    const observer = new MutationObserver(function() {
        hideMailAndUrlFields();
    });
    observer.observe(document.body, {
        childList: true,
        subtree: true
    });
</script>
