    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1c2e 0%, #2d2a4a 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            color: #f0f0f0;

        /* ========== 导航栏样式（与你喜欢的页面一致） ========== */
        .nav {
            background: rgba(20, 18, 32, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(169, 91, 195, 0.3);
        }
        .nav img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }
        .nav .title {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f5e7a3, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav a {
            color: #e0d4ff;
            text-decoration: none;
            transition: 0.2s;
        }
        .nav a:hover {
            color: #c084fc;
        }
        .nav p {
            display: inline;
        }

        /* ========== 主内容区 ========== */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
            text-align: center;
        }

        /* 百度 Logo 区域 */
        .logo-area {
            margin: 30px 0 20px;
        }
        .logo-area img {
            width: 270px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        /* 搜索框 */
        .search-form {
            margin: 20px 0;
        }
        .search-input {
            width: 540px;
            height: 44px;
            font-size: 18px;
            padding: 0 16px;
            background: #2a253e;
            border: 1px solid #4a3f6e;
            border-radius: 24px;
            color: #f3eefc;
            outline: none;
            transition: all 0.2s;
        }
        .search-input:focus {
            border-color: #a95bc3;
            box-shadow: 0 0 0 2px rgba(169, 91, 195, 0.3);
        }
        .search-btn {
            background: linear-gradient(95deg, #a95bc3, #7b2c9e);
            border: none;
            width: 100px;
            height: 44px;
            border-radius: 40px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 12px;
        }
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(169, 91, 195, 0.4);
        }

        /* 快捷链接区域 */
        .quick-links {
            margin: 40px 0 30px;
        }
        .quick-links a {
            color: #c9a5f0;
            text-decoration: none;
            margin: 0 12px;
            font-size: 14px;
            transition: 0.2s;
        }
        .quick-links a:hover {
            color: #a95bc3;
            text-decoration: underline;
        }

        /* 底部信息 */
        .footer-info {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(169, 91, 195, 0.2);
            font-size: 12px;
            color: #9a8fc2;
        }
        .footer-info a {
            color: #c9a5f0;
            text-decoration: none;
            margin: 0 8px;
        }
        .footer-info a:hover {
            color: #a95bc3;
            text-decoration: underline;
        }
        .footer-info p {
            margin: 8px 0;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .nav {
                padding: 10px 16px;
                gap: 12px;
            }
            .nav .title {
                font-size: 1rem;
            }
            .search-input {
                width: 280px;
                height: 40px;
                font-size: 16px;
            }
            .search-btn {
                width: 80px;
                height: 40px;
                font-size: 16px;
            }
            .logo-area img {
                width: 200px;
            }
            .quick-links a {
                display: inline-block;
                margin: 5px 8px;
            }
        }
    </style>
</head>
